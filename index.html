<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Tags Mini Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Mitr', sans-serif; 
            background-color: #FFFDF9; 
            color: #4A3E3D; 
            overflow-x: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        /* ดีไซน์การ์ดมินิมอล */
        .cute-card { 
            background: #FFFFFF; 
            border: 2px solid #F3E9DC; 
            border-radius: 14px;
            box-shadow: 0 4px 6px rgba(164, 144, 124, 0.05);
            transition: all 0.15s ease; 
            -webkit-tap-highlight-color: transparent; 
        }
        /* คิวถัดไปที่ระบบแนะนำให้กดก๊อปปี้ต่อ */
        .next-suggested {
            border-color: #FFD60A !important;
            box-shadow: 0 0 0 3px rgba(255, 214, 10, 0.35);
            transform: scale(1.01);
        }
        /* เอฟเฟกต์ก๊อปปี้เสร็จแล้วกะพริบเปลี่ยนสี */
        .copied-flash { animation: flash 0.4s ease forwards; }
        @keyframes flash { 
            0% { background-color: #FFF; } 
            50% { background-color: #FFB7B2; } 
            100% { background-color: #E8F5E9; border-color: #81C784; } 
        }
    </style>
</head>
<body class="p-3 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-3">
        <!-- ส่วนหัวขนาดกะทัดรัด ประหยัดพื้นที่หน้าต่างลอย -->
        <header class="text-center py-3 border-b-2 border-dashed border-[#F3E9DC] mb-1">
            <h1 class="text-xl font-bold text-[#4A3E3D]">
                RoV <span class="text-[#FF6B6B] bg-[#FFF0F0] px-1.5 py-0.5 rounded-md text-base">Tag</span> Deck
            </h1>
            <p class="text-[10px] text-[#A4907C] font-medium mt-1">
                จิ้มปุ๊บก๊อปปี้ปั๊บ ระบบจะเลือกตัวถัดไปให้ทันที 🎀
            </p>
        </header>

        <!-- รายการแท็ก -->
        <div id="listContainer" class="flex flex-col gap-2"></div>
    </div>

    <!-- แจ้งเตือนสถานะการก๊อปปี้ลอยตรงกลางจอ -->
    <div id="toast" class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#FF8BAB] text-white px-5 py-2.5 rounded-full font-bold shadow-xl transition-all duration-300 opacity-0 pointer-events-none z-50 text-xs border-2 border-white">
        คัดลอกเรียบร้อย! ✨
    </div>

    <script>
        const tagData = [
            { tag: "#RoV #คลิปRoV #rovth", view: "10,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #คลิปRoV", view: "10,000", pts: "30" },
            { tag: "#RoV #ทมิฬหอกศักดิ์สิทธิ์ #RoVฮีโร่ใหม่หัวใจไทย #RoVฮีโร่ใหม่ทมิฬ", view: "15,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #rovth", view: "15,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #fpy", view: "15,000", pts: "30" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ช็อตขโมย God Slayer" },
            { tag: "#RoV #rovth #RoVThailand", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #fpy", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #trending", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #trending", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #เล่นRoV #rovh", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #เล่นRoV", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #RoVเกมภาพสวย", view: "20,000", pts: "30" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ช็อตโหดด้วยวีดีโอจาก Highlight ในเกม" },
            { tag: "#RoV #rovth #คลิปRoV", view: "15,000", pts: "30", note: "คลิปบัคเพิ่มคลิปในภารกิจได้แล้วค่อยปั้มวิว" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ขโมยบัพศัตรู" },
            { tag: "#RoV #RoVThailand #RoVล่าการ์ดกลางสยาม #RoVDay2026", view: "20,000", pts: "30" }
        ];

        function render() {
            const list = document.getElementById('listContainer');
            list.innerHTML = ''; 
            
            tagData.forEach((item, i) => {
                const clipNum = String(i + 1).padStart(2, '0');
                const div = document.createElement('div');
                div.id = `card-${i}`;
                div.className = `cute-card w-full p-3 flex items-center gap-3 cursor-pointer select-none`;
                
                if (i === 0) div.classList.add('next-suggested');
                
                div.onclick = () => {
                    const textToCopy = `คลิปที่ ${clipNum}: ${item.tag} (View ${item.view})`;
                    
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        div.classList.remove('next-suggested');
                        div.classList.add('copied-flash');
                        setTimeout(() => div.classList.remove('copied-flash'), 400);
                        
                        const toast = document.getElementById('toast');
                        toast.style.opacity = "1";
                        setTimeout(() => toast.style.opacity = "0", 600);

                        // เลื่อนคิวไฮไลท์ไปยังตัวถัดไปอัตโนมัติ
                        const nextIndex = i + 1;
                        if (nextIndex < tagData.length) {
                            const nextCard = document.getElementById(`card-${nextIndex}`);
                            if (nextCard) {
                                document.querySelectorAll('.cute-card').forEach(c => c.classList.remove('next-suggested'));
                                nextCard.classList.add('next-suggested');
                                nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    });
                };

                const noteHTML = item.note ? `<div class="text-[10px] text-[#FF8BAB] font-medium mt-0.5 bg-[#FFF5F7] px-1.5 py-0.5 rounded inline-block border border-[#FFE3E8] italic">💡 ${item.note}</div>` : '';

                div.innerHTML = `
                    <div class="bg-[#FEF9E7] border border-[#F9E79F] text-[#B7950B] w-8 h-8 flex items-center justify-center rounded-xl text-xs font-bold flex-shrink-0">
                        ${clipNum}
                    </div>
                    <div class="flex-grow">
                        <div class="text-xs text-[#4A3E3D] font-medium leading-relaxed tracking-wide">
                            ${item.tag}
                        </div>
                        <div class="text-[9px] text-[#A4907C] uppercase font-semibold mt-0.5 flex items-center gap-1">
                            <span class="bg-[#E8F8F5] text-[#117A65] px-1 py-0.2 rounded border border-[#D1F2EB]">👁️ ${item.view}</span>
                            <span class="bg-[#F4ECF7] text-[#6C3483] px-1 py-0.2 rounded border border-[#E8DAEF]">⭐ ${item.pts} PTS</span>
                        </div>
                        ${noteHTML}
                    </div>
                `;
                list.appendChild(div);
            });
        }
        render();
    </script>
    <script src="security.js"></script>
</body>
</html>
