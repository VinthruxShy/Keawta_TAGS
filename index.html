<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoV Tags Cute Deck - Vinthrux</title>
    <!-- ใช้ Tailwind CSS และ Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Mitr', 'Chakra Petch', sans-serif; 
            background-color: #FFFDF9; /* สีครีมน้ำตาลอ่อนๆ อบอุ่น */
            color: #4A3E3D; /* สีน้ำตาลเข้มอ่านง่าย ไม่สว่างบาดตา */
            overflow-x: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        /* สไตล์การ์ดโทนหวาน */
        .cute-card { 
            background: #FFFFFF; 
            border: 2px solid #F3E9DC; 
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(164, 144, 124, 0.08);
            transition: all 0.2s ease; 
            margin-bottom: 12px; 
            -webkit-tap-highlight-color: transparent; 
        }
        .cute-card:hover {
            border-color: #FFC6FF;
            transform: translateY(-2px);
        }
        /* ไฮไลท์การ์ดถัดไปที่ระบบแนะนำให้ก๊อปต่อ */
        .next-suggested {
            border-color: #FFD60A !important;
            box-shadow: 0 0 0 3px rgba(255, 214, 10, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }
        /* แอนิเมชันตอนกดก๊อปปี้สำเร็จ */
        .copied-flash { animation: flash 0.4s ease forwards; }
        @keyframes flash { 
            0% { background-color: #FFF; } 
            50% { background-color: #FFB7B2; } 
            100% { background-color: #E8F5E9; border-color: #81C784; } 
        }
        /* แถบเมนูด้านล่างสุดคิ้วท์ */
        .nav-cute { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border-top: 2px solid #F3E9DC; 
        }
        .nav-item-active {
            color: #FF1493 !important;
            font-weight: bold;
        }
        .nav-item-active::after { 
            content: '💖'; 
            position: absolute; 
            bottom: -12px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 10px;
        }
        /* โหมดหน้าต่างย่อส่วน */
        body.mini-mode {
            background-color: #FFF9F2;
            padding: 4px !important;
        }
        body.mini-mode header, body.mini-mode nav {
            display: none !important;
        }
        body.mini-mode .main-wrapper {
            margin-bottom: 10px !important;
            max-width: 100% !important;
        }
        body.mini-mode .cute-card {
            padding: 10px !important;
            margin-bottom: 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen relative pb-28">

    <!-- ปุ่มควบคุมโหมดหน้าต่างย่อส่วน -->
    <div class="fixed top-3 right-3 z-50">
        <button id="toggleMiniBtn" onclick="toggleMiniMode()" class="bg-[#6B4E3D] hover:bg-[#4A3E3D] text-white text-xs px-3 py-2 rounded-full font-medium shadow-md transition-all flex items-center gap-1">
            <span>✨ โหมดย่อหน้าจอ</span>
        </button>
    </div>

    <div class="w-full max-w-md space-y-4 main-wrapper">
        <!-- ส่วนหัวเว็บดีไซน์พาสเทล -->
        <header class="text-center py-6 border-b-2 border-dashed border-[#F3E9DC] mb-2">
            <h1 class="text-3xl font-bold tracking-tight text-[#4A3E3D]">
                RoV <span class="text-[#FF6B6B] bg-[#FFF0F0] px-2 rounded-lg">Tag</span> Deck
            </h1>
            <p class="text-xs text-[#A4907C] font-medium mt-2 bg-[#FEF9E7] inline-block px-3 py-1 rounded-full border border-[#F9E79F]">
                🍯 จิ้มที่การ์ดเพื่อก๊อปปี้ ตัวต่อไปจะไฮไลท์ให้เลยจ้า!
            </p>
        </header>

        <!-- รายการการ์ดแฮชแท็ก -->
        <div id="listContainer" class="grid grid-cols-1"></div>
    </div>

    <!-- กล่องแจ้งเตือนก๊อปปี้สำเร็จ (Toast) -->
    <div id="toast" class="fixed top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#FF8BAB] text-white px-6 py-3 rounded-2xl font-bold shadow-xl transition-all duration-300 opacity-0 pointer-events-none z-50 text-sm flex items-center gap-2 border-2 border-white">
        <span>คัดลอกแล้วน้าาา! 🎀</span>
    </div>

    <!-- แถบเมนูด้านล่าง -->
    <nav class="fixed bottom-0 left-0 right-0 nav-cute p-3 flex justify-around items-center z-40 pb-5 rounded-t-3xl shadow-[0_-5px_15px_rgba(164,144,124,0.08)]">
        <a href="index.html" class="nav-item nav-item-active relative flex flex-col items-center gap-1 text-[#A4907C] text-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[11px] font-medium">แท็กทั้งหมด</span>
        </a>
        <a href="mission.html" class="nav-item flex flex-col items-center gap-1 text-[#A4907C] hover:text-[#4A3E3D] transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="text-[11px] font-medium">ภารกิจ</span>
        </a>
        <a href="calc.html" class="nav-item flex flex-col items-center gap-1 text-[#A4907C] hover:text-[#4A3E3D] transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h2a2 2 0 002-2zm6-10V7a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2zm0 0v10a2 2 0 002 2h2a2 2 0 002-2v-10a2 2 0 002-2z"></path></svg>
            <span class="text-[11px] font-medium">คำนวณ</span>
        </a>
    </nav>

    <script>
        // ข้อมูล 17 รายการดั้งเดิมของคุณ
        const tagData = [
            { tag: "#RoV #คลิปRoV #rovth", view: "10,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #คลิปRoV", view: "10,000", pts: "30" },
            { tag: "#RoV #ทมิฬหอกศักดิ์สิทธิ์ #RoVฮีโร่ใหม่หัวใจไทย #RoVฮีโร่ใหม่ทมิฬ", view: "15,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #rovth", view: "15,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #fpy", view: "15,000", pts: "30" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ช็อตขโมย God Slayer" },
            { tag: "#RoV #rovth #RoVThailand", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #fpy", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #trending", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #trending", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #เล่นRoV #rovh", view: "20,000", pts: "30" },
            { tag: "#RoV #rovth #เล่นRoV", view: "20,000", pts: "30" },
            { tag: "#RoV #RoVเป็นเกมตลก #RoVเกมภาพสวย", view: "20,000", pts: "30" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ช็อตโหดด้วยวีดีโอจาก Highlight ในเกม" },
            { tag: "#RoV #rovth #คลิปRoV", view: "15,000", pts: "30", note: "คลิปบัคเพิ่มคลิปในภารกิจได้แล้วค่อยปั้มวิว" },
            { tag: "#RoVเป็นเกมตลก #RoV #RoVThailand", view: "20,000", pts: "30", note: "โชว์ขโมยบัพศัตรู" },
            { tag: "#RoV #RoVThailand #RoVล่าการ์ดกลางสยาม #RoVDay2026", view: "20,000", pts: "30" }
        ];

        let isMiniMode = false;

        // ฟังก์ชันสลับโหมดย่อหน้าจอสำหรับใช้งานเปิดซ้อนหน้าต่างคู่
        function toggleMiniMode() {
            isMiniMode = !isMiniMode;
            const btn = document.getElementById('toggleMiniBtn');
            if (isMiniMode) {
                document.body.classList.add('mini-mode');
                btn.innerHTML = '<span>🏠 หน้าจอปกติ</span>';
                btn.className = "fixed top-1 right-1 z-50 bg-[#FF6B6B] text-white text-[10px] px-2 py-1 rounded-md font-medium shadow-md transition-all";
            } else {
                document.body.classList.remove('mini-mode');
                btn.innerHTML = '<span>✨ โหมดย่อหน้าจอ</span>';
                btn.className = "fixed top-3 right-3 z-50 bg-[#6B4E3D] hover:bg-[#4A3E3D] text-white text-xs px-3 py-2 rounded-full font-medium shadow-md transition-all flex items-center gap-1";
            }
        }

        function render() {
            const list = document.getElementById('listContainer');
            list.innerHTML = ''; 
            
            tagData.forEach((item, i) => {
                const clipNum = String(i + 1).padStart(2, '0');
                const div = document.createElement('div');
                div.id = `card-${i}`;
                div.className = `cute-card w-full p-4 flex items-center gap-3 cursor-pointer select-none`;
                
                // ถ้ารายการแรก ให้ใส่สถานะแนะนำรอก๊อปปี้ไว้ก่อนเลย
                if (i === 0) div.classList.add('next-suggested');
                
                div.onclick = () => {
                    const textToCopy = `คลิปที่ ${clipNum}: ${item.tag} (View ${item.view})`;
                    
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        // เอฟเฟกต์การก๊อปปี้สำเร็จบนการ์ดปัจจุบัน
                        div.classList.remove('next-suggested');
                        div.classList.add('copied-flash');
                        setTimeout(() => div.classList.remove('copied-flash'), 400);
                        
                        // แสดง Toast แจ้งเตือนสั้นๆ คิ้วท์ๆ
                        const toast = document.getElementById('toast');
                        toast.style.opacity = "1";
                        setTimeout(() => toast.style.opacity = "0", 600);

                        // ⚡ ระบบ Auto-Focus และขยับคิวถัดไปให้ก๊อปต่อทันที
                        const nextIndex = i + 1;
                        if (nextIndex < tagData.length) {
                            const nextCard = document.getElementById(`card-${nextIndex}`);
                            if (nextCard) {
                                // ลบไฮไลท์เก่าออกทั้งหมดเพื่อความชัวร์ แล้วไปผูกกับใบถัดไป
                                document.querySelectorAll('.cute-card').forEach(c => c.classList.remove('next-suggested'));
                                nextCard.classList.add('next-suggested');
                                
                                // เลื่อนหน้าจอตามความเหมาะสมเพื่อให้ปุ่มถัดไปลอยมาให้จิ้มง่ายๆ
                                nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        }
                    });
                };

                // วิดเจ็ตโน้ตสีส้มพาสเทลน่ารักๆ
                const noteHTML = item.note ? `<div class="text-[11px] text-[#FF8BAB] font-medium mt-1 bg-[#FFF5F7] px-2 py-0.5 rounded-md inline-block border border-[#FFE3E8] italic">💡 ${item.note}</div>` : '';

                div.innerHTML = `
                    <!-- ตัวเลขคลิปโทนสีเหลืองน้ำผึ้ง -->
                    <div class="bg-[#FEF9E7] border-2 border-[#F9E79F] text-[#B7950B] w-9 h-9 flex items-center justify-center rounded-xl text-xs font-bold flex-shrink-0">
                        ${clipNum}
                    </div>
                    <div class="flex-grow">
                        <div class="text-[13px] text-[#4A3E3D] font-medium leading-relaxed tracking-wide">
                            ${item.tag}
                        </div>
                        <div class="text-[10px] text-[#A4907C] uppercase font-semibold mt-1 flex items-center gap-1.5">
                            <span class="bg-[#E8F8F5] text-[#117A65] px-1.5 py-0.5 rounded-md border border-[#D1F2EB]">👁️ ${item.view}</span>
                            <span class="bg-[#F4ECF7] text-[#6C3483] px-1.5 py-0.5 rounded-md border border-[#E8DAEF]">⭐ ${item.pts} PTS</span>
                        </div>
                        ${noteHTML}
                    </div>
                `;
                list.appendChild(div);
            });
        }
        render();
    </script>
    <script src="security.js"></script>
</body>
</html>
